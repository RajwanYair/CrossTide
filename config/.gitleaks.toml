# gitleaks configuration — CrossTide (F10)
# https://github.com/gitleaks/gitleaks

title = "CrossTide gitleaks config"

[extend]
# Use the default gitleaks ruleset
useDefault = true

# Paths to ignore (generated / non-sensitive)
[allowlist]
  paths = [
    '''node_modules/''',
    '''dist/''',
    '''coverage/''',
    '''build/''',
    '''playwright-report/''',
    '''test-results/''',
    '''\.lock$''',
    '''package-lock\.json$''',
    '''\.snap$''',
  ]
  # `FinnhubStreamOptions` is a TypeScript type name (imported/exported in
  # src/core/finnhub-stream-manager.ts and src/core/index.ts), not a secret.
  # The default "finnhub-access-token" rule's loose regex false-positives on
  # it (low entropy ~3.9, confirmed not a credential).
  regexes = [
    '''FinnhubStreamOptions''',
  ]
  description = "Non-sensitive generated files and known false positives"
