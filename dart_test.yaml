# dart_test.yaml — package:test global configuration.
#
# Per-test timeout of 30 seconds.  With ≈200 tests that gives a theoretical
# maximum run-time of 100 s — well inside the 1000 s hard limit enforced by
# the CI job timeout and tool.ps1 wrapper.
#
# If a single test hangs (network call, un-cancelled timer, blocked Future),
# the framework kills it gracefully after 30 s and marks it as a timeout
# failure rather than letting the whole process run forever.

timeout: 30s

# Run tests on all platforms using the Dart VM (not browser/Node).
platforms: [vm]
