# Pre-commit hooks for CrossTide (Flutter/Dart)
#
# Mirrors the enterprise pre-commit philosophy used across the workspace:
# catch formatting, analysis and secret issues BEFORE they reach CI.
#
# Install:
#   pip install pre-commit        # one-time: install the framework
#   pre-commit install            # one-time: wire hooks into .git
#
# Run manually:
#   pre-commit run --all-files    # check all files now
#
# Hooks are also run by the "dev: pre-commit run all" VS Code task.

minimum_version: '3.0.0'

repos:
  # ── Dart / Flutter ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        language: system
        entry: dart format --set-exit-if-changed lib test
        types: [file]
        pass_filenames: false
        always_run: true

      - id: flutter-analyze
        name: flutter analyze
        language: system
        entry: flutter analyze --fatal-infos
        types: [file]
        pass_filenames: false
        always_run: true

  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: no-commit-to-branch
        args: [--branch, main]         # force PRs; direct pushes only via CI
        stages: [pre-commit]

  # ── Secret / credential detection ─────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)
        # Never commit API keys, credentials, or tokens
        # Matches environment: flutter_secure_storage holds secrets at runtime

  # ── Markdown ──────────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        files: '\.md$'
