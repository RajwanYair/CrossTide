<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="presGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00897B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="domGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6A1B9A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" rx="16" fill="#F8FAFF"/>
  <text x="360" y="34" font-size="18" font-weight="700" fill="#1A237E" text-anchor="middle">CrossTide — Clean Architecture</text>

  <!-- PRESENTATION LAYER -->
  <rect x="30" y="52" width="660" height="78" rx="10" fill="url(#presGrad)" filter="url(#shadow)"/>
  <text x="360" y="76" font-size="13" font-weight="700" fill="white" text-anchor="middle">📱 PRESENTATION</text>
  <text x="130" y="96" font-size="11" fill="white" text-anchor="middle">Screens</text>
  <text x="270" y="96" font-size="11" fill="white" text-anchor="middle">Riverpod Providers</text>
  <text x="430" y="96" font-size="11" fill="white" text-anchor="middle">GoRouter</text>
  <text x="570" y="96" font-size="11" fill="white" text-anchor="middle">fl_chart</text>
  <text x="130" y="114" font-size="10" fill="#BBDEFB" text-anchor="middle">4 screens</text>
  <text x="270" y="114" font-size="10" fill="#BBDEFB" text-anchor="middle">Compile-safe DI</text>
  <text x="430" y="114" font-size="10" fill="#BBDEFB" text-anchor="middle">Declarative nav</text>
  <text x="570" y="114" font-size="10" fill="#BBDEFB" text-anchor="middle">Price + SMA chart</text>

  <!-- Arrow down -->
  <line x1="360" y1="130" x2="360" y2="148" stroke="#78909C" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="356,148 364,148 360,155" fill="#78909C"/>

  <!-- APPLICATION LAYER -->
  <rect x="30" y="158" width="660" height="78" rx="10" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="360" y="182" font-size="13" font-weight="700" fill="white" text-anchor="middle">⚙️ APPLICATION</text>
  <text x="130" y="202" font-size="11" fill="white" text-anchor="middle">RefreshService</text>
  <text x="270" y="202" font-size="11" fill="white" text-anchor="middle">NotificationService</text>
  <text x="430" y="202" font-size="11" fill="white" text-anchor="middle">BackgroundService</text>
  <text x="580" y="202" font-size="11" fill="white" text-anchor="middle">HealthCheckService</text>
  <text x="130" y="220" font-size="10" fill="#B2DFDB" text-anchor="middle">Orchestrator</text>
  <text x="270" y="220" font-size="10" fill="#B2DFDB" text-anchor="middle">Local notifications</text>
  <text x="430" y="220" font-size="10" fill="#B2DFDB" text-anchor="middle">WorkManager/Timer</text>
  <text x="580" y="220" font-size="10" fill="#B2DFDB" text-anchor="middle">Self-diagnostics</text>

  <!-- Arrow down -->
  <line x1="360" y1="236" x2="360" y2="254" stroke="#78909C" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="356,254 364,254 360,261" fill="#78909C"/>

  <!-- DOMAIN LAYER -->
  <rect x="30" y="264" width="660" height="78" rx="10" fill="url(#domGrad)" filter="url(#shadow)"/>
  <text x="360" y="288" font-size="13" font-weight="700" fill="white" text-anchor="middle">🧠 DOMAIN — Pure Dart</text>
  <text x="120" y="308" font-size="11" fill="white" text-anchor="middle">SmaCalculator</text>
  <text x="270" y="308" font-size="11" fill="white" text-anchor="middle">CrossUpDetector</text>
  <text x="430" y="308" font-size="11" fill="white" text-anchor="middle">AlertStateMachine</text>
  <text x="590" y="308" font-size="11" fill="white" text-anchor="middle">Entities + AlertProfile</text>
  <text x="120" y="326" font-size="10" fill="#E1BEE7" text-anchor="middle">SMA50/150/200</text>
  <text x="270" y="326" font-size="10" fill="#E1BEE7" text-anchor="middle">Cross-up detection</text>
  <text x="430" y="326" font-size="10" fill="#E1BEE7" text-anchor="middle">Alert FSM</text>
  <text x="590" y="326" font-size="10" fill="#E1BEE7" text-anchor="middle">Immutable, Equatable</text>

  <!-- Arrow down -->
  <line x1="360" y1="342" x2="360" y2="360" stroke="#78909C" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="356,360 364,360 360,367" fill="#78909C"/>

  <!-- DATA LAYER -->
  <rect x="30" y="370" width="660" height="36" rx="10" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="180" y="393" font-size="11" font-weight="700" fill="white" text-anchor="middle">🗄️ DATA</text>
  <text x="330" y="393" font-size="11" fill="white" text-anchor="middle">YahooFinance · AlphaVantage · Mock</text>
  <text x="565" y="393" font-size="11" fill="white" text-anchor="middle">StockRepository · Drift/SQLite</text>
</svg>
