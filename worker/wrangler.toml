name = "crosstide-api"
main = "index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
# Bump this whenever you make a backwards-incompatible API change
API_VERSION = "1"

# P2: KV namespace for caching chart/quote/search data with market-hours-aware TTL.
# Create with: wrangler kv namespace create QUOTE_CACHE
[[kv_namespaces]]
binding = "QUOTE_CACHE"
id = "PLACEHOLDER_KV_NAMESPACE_ID"
preview_id = "PLACEHOLDER_KV_PREVIEW_ID"

# P3: D1 database for user data persistence (watchlists, portfolios, alerts, settings).
# Create with: wrangler d1 create crosstide-db
# Apply migrations: wrangler d1 migrations apply crosstide-db
[[d1_databases]]
binding = "DB"
database_name = "crosstide-db"
database_id = "PLACEHOLDER_D1_DATABASE_ID"
migrations_dir = "migrations"

# G13: Cloudflare native Rate Limiting API binding.
# Provides global (cross-edge) rate limiting via CF's managed service.
# Declared here so `wrangler deploy` wires up the binding automatically.
# The binding is optional — the worker falls back to the in-memory bucket
# when RATE_LIMITER is not available (local dev / unit tests).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
# 60 requests per 60-second window per unique key
simple = { limit = 60, period = 60 }

[dev]
port = 8787
local_protocol = "http"

# R3: Durable Object for WebSocket fan-out (one instance per ticker symbol).
# Provides efficient real-time streaming: single upstream per symbol,
# fans out to all connected clients via WebSocket Hibernation API.
[durable_objects]
bindings = [
  { name = "TICKER_FANOUT", class_name = "TickerFanout" }
]

[[migrations]]
tag = "v1"
new_classes = ["TickerFanout"]

# R7: Cron trigger for server-side alert evaluation.
# Runs every 5 minutes during typical market hours (Mon-Fri 13:30-20:00 UTC).
[triggers]
crons = ["*/5 * * * *"]
