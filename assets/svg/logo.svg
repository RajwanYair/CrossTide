<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Ocean wave background circle -->
  <circle cx="60" cy="60" r="56" fill="#0D47A1" opacity="0.92"/>
  <!-- Tide wave -->
  <path d="M10 72 Q30 58 50 68 Q70 78 90 62 Q105 50 110 48" stroke="#29B6F6" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Rising price line (Golden Cross) -->
  <polyline points="18,85 32,75 46,70 58,62 68,52 82,44 100,36"
            stroke="#FFD54F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- SMA200 dashed line -->
  <polyline points="18,68 38,66 58,64 78,62 100,60"
            stroke="#FF7043" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="6 4" fill="none" opacity="0.9"/>
  <!-- Cross-up marker dot -->
  <circle cx="68" cy="52" r="5" fill="#69F0AE" stroke="white" stroke-width="2"/>
  <!-- Upward arrow at cross-up -->
  <path d="M68 45 L65 50 L71 50 Z" fill="#69F0AE"/>
  <!-- Text: CT -->
  <text x="60" y="108" font-family="'Segoe UI',Arial,sans-serif" font-size="11"
        font-weight="700" fill="white" text-anchor="middle" opacity="0.85">CrossTide</text>
</svg>
