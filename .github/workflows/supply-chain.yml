name: Supply Chain Security

on:
  push:
    branches: [main]
    paths:
      - "package-lock.json"
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "package-lock.json"
      - "package.json"
  schedule:
    # Weekly Monday 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: npm audit + signature verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high

      - name: Verify package signatures
        run: npm audit signatures

      - name: Create issue on scheduled audit failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔒 Dependency audit failure — ${new Date().toISOString().slice(0, 10)}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
              per_page: 10,
            });
            const existing = issues.find(i => i.title.startsWith('🔒 Dependency audit failure'));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  '## Automated Security Alert',
                  '',
                  'The weekly `npm audit` check found vulnerabilities at **high** or above.',
                  '',
                  '**Action required:** Run `npm audit` locally and update affected packages.',
                  '',
                  `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ].join('\n'),
                labels: ['security', 'dependencies'],
              });
            }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  socket:
    name: Socket.dev analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Socket Security
        uses: SocketDev/socket-security-action@v1
        with:
          # SOCKET_SECURITY_API_KEY must be set in repo secrets
          # If not configured, this step will be skipped gracefully
          api_key: ${{ secrets.SOCKET_SECURITY_API_KEY || '' }}

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --production --failOn "GPL-3.0-only;AGPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-or-later" --summary || {
            echo "::error::Found disallowed licenses in production dependencies"
            exit 1
          }
