name: Copilot Setup Steps
# Bootstrap environment for the GitHub Copilot Coding Agent.
# Reference: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent
#
# CrossTide uses npm workspaces; the Coding Agent runs in an isolated container
# that only checks out THIS repo, so we install root + worker deps here.

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install root dependencies (with workspaces)
        run: npm ci --ignore-scripts

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci --ignore-scripts

      - name: Verify toolchain
        run: |
          node --version
          npx tsc --version
          npx vitest --version
          npx eslint --version
          npx vite --version

      - name: Quick sanity (typecheck only)
        run: npm run typecheck
