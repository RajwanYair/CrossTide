# Generate Linux Playwright visual-regression baselines.
#
# Visual snapshots are platform-specific (-linux.png) and must be generated
# on the same OS that E2E CI jobs run on. Developers on macOS/Windows cannot
# produce them locally. This workflow runs on demand, generates baselines on
# Ubuntu, and commits them back to tests/e2e/*-snapshots/.
#
# Trigger: workflow_dispatch (manual). Use after intentional UI changes.
name: Visual Regression Baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update baselines on"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  update-baselines:
    name: Refresh Playwright Baselines
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build production bundle (root-served for preview)
        run: npm run build
        env:
          VITE_BASE: "/"

      - name: Update visual snapshots
        run: npx playwright test tests/e2e/visual.spec.ts --update-snapshots
        continue-on-error: false

      - name: Commit and push baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/*-snapshots/ || true
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "test(e2e): refresh visual regression baselines [skip ci]"
            git push origin HEAD:${{ inputs.branch }}
          fi
