name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build production
        run: npx vite build

      - name: Upload source maps to GlitchTip (P14)
        run: node scripts/upload-sourcemaps.mjs
        env:
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        continue-on-error: true  # Non-fatal: missing secret = skip silently

      - name: Bundle size check
        run: npm run check:bundle

      - name: Package build output
        run: |
          cd dist
          zip -r ../crosstide-${{ github.ref_name }}.zip .
          cd ..
          sha256sum crosstide-${{ github.ref_name }}.zip > crosstide-${{ github.ref_name }}.zip.sha256

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist/
          output-file: crosstide-${{ github.ref_name }}.sbom.spdx.json
          format: spdx-json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: crosstide-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            crosstide-${{ github.ref_name }}.zip
            crosstide-${{ github.ref_name }}.zip.sha256
            crosstide-${{ github.ref_name }}.sbom.spdx.json
