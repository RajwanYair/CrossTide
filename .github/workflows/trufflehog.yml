name: trufflehog

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly Monday 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Verified secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for diff-based scan)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: TruffleHog OSS — only verified findings
        # Only alerts on secrets that are cryptographically verified active.
        # Complements gitleaks (regex-based) with entropy+verification.
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --no-update
