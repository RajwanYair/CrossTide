# =============================================================================
# Link Check — CrossTide
# Monthly scheduled job to verify all Markdown links are alive.
# Creates a GitHub Issue when dead links are found, rather than blocking PRs.
# =============================================================================
name: Link Check

on:
  schedule:
    # 1st of each month at 04:17 UTC (off-peak to avoid GitHub rate limits)
    - cron: "17 4 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Find and check all Markdown files
        id: check
        run: |
          echo "🔗 Checking all Markdown files..."
          set +e
          find . -name "*.md" \
            ! -path "*/node_modules/*" \
            ! -path "*/coverage/*" \
            ! -path "*/dist/*" \
            ! -path "*/.wrangler/*" \
            | xargs -I{} npx markdown-link-check \
              --quiet \
              --config .github/link-check.config.json \
              {} 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open issue if dead links found
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🔗 Dead links found in Markdown files",
              body: [
                "The monthly link-check workflow found dead links in Markdown files.",
                "",
                `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
                "",
                "Please review the workflow output above and fix the broken links.",
                "",
                "_This issue was automatically created by the link-check workflow._",
              ].join("\n"),
              labels: ["documentation", "maintenance"],
            });
