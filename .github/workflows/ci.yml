# =============================================================================
# CI — CrossTide — Unified quality gate
# Typecheck · ESLint · Stylelint · Vitest (Node 24) · Security · Build
# Runs on every push to main and all pull requests.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/prompts/**"
      - ".github/AGENTS.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/prompts/**"
      - ".github/AGENTS.md"
  workflow_dispatch:

# Cancel any in-progress CI run for the same branch/PR on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt into Node.js 24 for GitHub Actions JavaScript runtime to suppress
# Node.js 20 deprecation warnings (default switches to 24 in June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: oxlint (fast Rust pre-pass, errors only)
        run: npx oxlint --quiet src tests || true

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run lint:css

      - name: HTMLHint
        run: npm run lint:html

      - name: Markdownlint
        run: npm run lint:md

      - name: Prettier check
        run: npm run format:check

      - name: Forbid focused/skipped tests
        run: node scripts/check-test-focus-skip.mjs

      - name: Unit tests
        run: npm run test:coverage

      - name: Build
        run: npx vite build

      - name: Bundle size check
        run: npm run check:bundle

      - name: Color contrast check
        run: npm run check:contrast

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      - name: Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential secrets in src/ and worker/..."
          FOUND=0
          for PATTERN in 'api[_-]?key\s*[:=]' 'apiKey\s*[:=]' 'secret\s*[:=]' 'password\s*[:=]' 'Bearer\s+[A-Za-z0-9]{20,}'; do
            if grep -rEn "$PATTERN" src/ worker/ --include="*.ts" 2>/dev/null | grep -qv '//.*:'; then
              echo "::error::Potential secret pattern found: $PATTERN"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "✅ No hardcoded secrets detected."

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install --package-lock-only --ignore-scripts --silent
          npx @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file sbom.json \
            --package-lock-only \
            --ignore-npm-errors

      - name: Upload SBOM artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-baseline
          path: coverage/coverage-summary.json
          retention-days: 30

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-test-build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium --reporter=github
        env:
          VITE_BASE: /

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-test-build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: dist
          path: dist/

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun --config config/lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: config/.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  worker-health:
    name: Worker Health Check (K10)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-test-build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start worker (wrangler dev)
        run: npx wrangler dev worker/index.ts --port 8787 &
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Wait for worker to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8787/api/health > /dev/null 2>&1; then
              echo "Worker is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Worker failed to start"
          exit 1

      - name: Verify health endpoint
        run: |
          RESP=$(curl -sf http://localhost:8787/api/health)
          echo "$RESP"
          echo "$RESP" | jq -e '.status == "ok"'

      - name: Verify X-Request-ID header
        run: |
          HEADERS=$(curl -sI http://localhost:8787/api/health)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-request-id"
