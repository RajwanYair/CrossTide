name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Is it related to a frustration?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Watchlist
        - Charts
        - Screener
        - Alerts
        - Portfolio
        - Rebalance
        - Earnings Calendar
        - Consensus/Signals
        - Signal DSL / Backtest
        - Risk Metrics
        - Worker API
        - Settings/Config
        - Performance
        - Accessibility
        - Mobile / PWA
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important
        - Critical for my workflow
