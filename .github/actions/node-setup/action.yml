# =============================================================================
# Composite action: checkout + setup-node@v7 + npm ci
# Usage in any workflow job:
#   - uses: ./.github/actions/node-setup
#     with:
#       node-version: "24"        # optional, default "24"
#       install-args: "--omit=dev" # optional, default ""
# =============================================================================
name: "Setup Node.js with cache and npm ci"
description: "DRY composite for checkout → setup-node (npm cache) → npm ci"

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"
  install-args:
    description: "Extra args forwarded to npm ci (e.g. --omit=dev)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: npm ci ${{ inputs.install-args }}
