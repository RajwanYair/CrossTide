# =============================================================================
# Composite action: checkout + setup-node@v4 + npm ci
# Usage in any workflow job:
#   - uses: ./.github/actions/node-setup
#     with:
#       node-version: "24"        # optional, default "24"
#       install-args: "--omit=dev" # optional, default ""
# =============================================================================
name: "Setup Node.js with cache and npm ci"
description: "DRY composite for checkout → setup-node (npm cache) → npm ci"

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"
  install-args:
    description: "Extra args forwarded to npm ci (e.g. --omit=dev)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: npm ci ${{ inputs.install-args }}
