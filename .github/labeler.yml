# Label configuration for actions/labeler@v5
# Maps file paths to PR labels

domain:
  - changed-files:
      - any-glob-to-any-file: "src/domain/**"

types:
  - changed-files:
      - any-glob-to-any-file: "src/types/**"

core:
  - changed-files:
      - any-glob-to-any-file: "src/core/**"

providers:
  - changed-files:
      - any-glob-to-any-file: "src/providers/**"

cards:
  - changed-files:
      - any-glob-to-any-file: "src/cards/**"

ui:
  - changed-files:
      - any-glob-to-any-file: "src/ui/**"

worker:
  - changed-files:
      - any-glob-to-any-file: "worker/**"

styles:
  - changed-files:
      - any-glob-to-any-file: "src/styles/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

github-config:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "!.github/workflows/**"
          - "!.github/ISSUE_TEMPLATE/**"

copilot-config:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/copilot-instructions.md"
          - ".github/instructions/**"
          - ".github/prompts/**"
          - ".github/AGENTS.md"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

compat:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/browser/**"
          - "tests/e2e/**"
          - ".browserslistrc"
          - "playwright.config.ts"
          - "vitest.browser.config.ts"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"
